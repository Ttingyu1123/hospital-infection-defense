<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON VANGUARD — 坦克保衛戰</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="frame">
  <header>
    <h1>IRON VANGUARD</h1>
    <p class="subtitle">坦克保衛戰 — 守住基地，撐過 5 波進攻</p>
  </header>
  <div id="canvas-wrap">
    <canvas id="game" width="960" height="720"></canvas>
  </div>
  <footer>
    <div class="controls">
      <span><b>WASD / 方向鍵</b> 移動</span>
      <span><b>Space</b> 射擊</span>
      <span><b>P</b> 暫停</span>
      <span><b>M</b> 音效開關</span>
      <span><b>B</b> 音樂開關</span>
      <span><b>R</b> 結束後重新開始</span>
    </div>
  </footer>
</div>
<script src="js/constants.js"></script>
<script src="js/audio.js"></script>
<script src="js/particles.js"></script>
<script src="js/map.js"></script>
<script src="js/bullet.js"></script>
<script src="js/tank.js"></script>
<script src="js/player.js"></script>
<script src="js/enemy.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
